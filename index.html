<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>朝礼安全・KY活動シート生成 | ハゼモト建設</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    
    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    
    .header p {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .content {
      padding: 2rem 1.5rem;
    }
    
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 2rem;
      border-bottom: 2px solid #eee;
    }
    
    .tab-btn {
      padding: 10px 20px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }
    
    .tab-btn.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }
    
    select, input[type="number"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    
    select:focus, input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    
    .checkbox-group {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    
    .checkbox-item:hover {
      background: #f5f5f5;
    }
    
    input[type="checkbox"] {
      cursor: pointer;
      width: 18px;
      height: 18px;
    }
    
    .checkbox-item label {
      margin: 0;
      font-weight: 400;
      cursor: pointer;
    }
    
    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }
    
    button {
      flex: 1;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    
    .sheet-output {
      display: none;
      margin-top: 2rem;
      padding: 2rem;
      background: #f9f9f9;
      border-radius: 8px;
      border-top: 3px solid #667eea;
    }
    
    .sheet-output.active {
      display: block;
      animation: slideIn 0.3s ease-out;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .sheet-title {
      font-size: 24px;
      font-weight: 600;
      color: #333;
      margin-bottom: 1rem;
      border-bottom: 2px solid #667eea;
      padding-bottom: 0.5rem;
    }
    
    .sheet-meta {
      background: white;
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1.5rem;
      border-left: 4px solid #667eea;
      font-size: 14px;
      line-height: 1.8;
    }
    
    .sheet-section {
      background: white;
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      border-left: 3px solid #667eea;
    }
    
    .sheet-section-title {
      font-size: 14px;
      font-weight: 600;
      color: #667eea;
      margin-bottom: 0.5rem;
    }
    
    .sheet-content {
      font-size: 13px;
      line-height: 1.8;
      color: #444;
      white-space: pre-wrap;
    }
    
    .points-display {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 6px;
      font-size: 18px;
      font-weight: 600;
      margin: 1rem 0;
    }
    
    .points-value {
      font-size: 32px;
      font-weight: 700;
    }
    
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 13px;
    }
    
    .data-table th, .data-table td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    
    .data-table th {
      background: #f5f5f5;
      font-weight: 600;
      color: #333;
    }
    
    .alert {
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 14px;
    }
    
    .alert-info {
      background: #e3f2fd;
      color: #1976d2;
      border-left: 4px solid #1976d2;
    }
    
    .alert-success {
      background: #e8f5e9;
      color: #388e3c;
      border-left: 4px solid #388e3c;
    }
    
    .ranking-table {
      width: 100%;
      margin: 1rem 0;
      font-size: 13px;
    }
    
    .ranking-table .rank-1 { background: #fff8e1; }
    .ranking-table .rank-2 { background: #f5f5f5; }
    .ranking-table .rank-3 { background: #fff3e0; }
    
    .ranking-table td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }
    
    @media print {
      body { background: white; }
      .tabs, .button-group { display: none; }
      .sheet-output { display: block; border: none; }
    }
    
    @media (max-width: 600px) {
      .grid-2 { grid-template-columns: 1fr; }
      .checkbox-group { grid-template-columns: 1fr; }
      .button-group { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏗️ 朝礼安全・KY活動シート生成</h1>
      <p>ハゼモト建設 現場用ツール（ポイント機能搭載）</p>
    </div>
    
    <div class="content">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('basic')">基本情報</button>
        <button class="tab-btn" onclick="switchTab('conditions')">作業条件</button>
        <button class="tab-btn" onclick="switchTab('evaluation')">評価</button>
        <button class="tab-btn" onclick="switchTab('ranking')">ランキング</button>
      </div>
      
      <!-- タブ1: 基本情報 -->
      <div id="basic" class="tab-content active">
        <div class="form-group">
          <label for="date">日付</label>
          <input type="date" id="date">
        </div>
        
        <div class="form-group">
          <label for="leader">リーダー（必須）</label>
          <select id="leader" required>
            <option value="">-- リーダーを選んでください --</option>
            <option value="ビン">ビン（現場A リーダー）</option>
            <option value="ドン">ドン（現場B リーダー）</option>
            <option value="永井">永井（現場C リーダー）</option>
            <option value="山口">山口（現場A）</option>
            <option value="江口">江口（現場B）</option>
            <option value="アンディ">アンディ（現場C）</option>
            <option value="リフキ">リフキ（現場A）</option>
            <option value="イクノ">イクノ（現場B）</option>
            <option value="トーヨーテック">トーヨーテック（現場C）</option>
            <option value="ミロク">ミロク（フリー）</option>
          </select>
        </div>
        
        <div class="grid-2">
          <div class="form-group">
            <label for="worktype">作業内容</label>
            <select id="worktype" required>
              <option value="">-- 作業を選んでください --</option>
              <option value="grass">🌾 草刈り作業</option>
              <option value="foundation">🏗️ 基礎工事</option>
              <option value="carpentry">🔨 大工工事</option>
              <option value="exterior">🧱 外構・擁壁工事</option>
              <option value="cleanup">🧹 清掃・片付け</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="projecttype">工事種別</label>
            <select id="projecttype" required>
              <option value="">-- 工事種別を選んでください --</option>
              <option value="new">新築工事</option>
              <option value="public">公社工事</option>
              <option value="tenant">テナント工事</option>
              <option value="other">その他</option>
            </select>
          </div>
        </div>
        
        <div class="form-group">
          <label for="facilityname">現場名（テキスト入力）</label>
          <input type="text" id="facilityname" placeholder="例：守恒団地、本町、深町">
        </div>
        
        <div class="form-group">
          <label>参加メンバー（複数選択可）</label>
          <div class="checkbox-group">
            <div class="checkbox-item">
              <input type="checkbox" id="m1" name="members" value="ビン">
              <label for="m1">ビン</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="m2" name="members" value="ドン">
              <label for="m2">ドン</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="m3" name="members" value="永井">
              <label for="m3">永井</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="m4" name="members" value="山口">
              <label for="m4">山口</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="m5" name="members" value="江口">
              <label for="m5">江口</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="m6" name="members" value="アンディ">
              <label for="m6">アンディ</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="m7" name="members" value="リフキ">
              <label for="m7">リフキ</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="m8" name="members" value="イクノ">
              <label for="m8">イクノ</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="m9" name="members" value="トーヨーテック">
              <label for="m9">トーヨーテック</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="m10" name="members" value="ミロク">
              <label for="m10">ミロク</label>
            </div>
          </div>
        </div>
      </div>
      
      <!-- タブ2: 作業条件 -->
      <div id="conditions" class="tab-content">
        <div class="grid-2">
          <div class="form-group">
            <label for="temperature">気温（℃）</label>
            <input type="number" id="temperature" min="0" max="50" placeholder="例：36">
          </div>
          
          <div class="form-group">
            <label for="weather">天候</label>
            <select id="weather">
              <option value="">-- 天候を選んでください --</option>
              <option value="sunny">晴れ</option>
              <option value="cloudy">曇り</option>
              <option value="rainy">雨</option>
              <option value="snowy">雪</option>
            </select>
          </div>
        </div>
        
        <div class="form-group">
          <label for="difficulty">難易度</label>
          <select id="difficulty">
            <option value="">-- 難易度を選んでください --</option>
            <option value="low">低（+5点）</option>
            <option value="middle">中（+10点）</option>
            <option value="high">高（+15点）</option>
            <option value="extreme">極高（+20点）</option>
          </select>
        </div>
      </div>
      
      <!-- タブ3: 評価 -->
      <div id="evaluation" class="tab-content">
        <div class="form-group">
          <label for="accuracy">入力精度・丁寧さ</label>
          <select id="accuracy">
            <option value="">-- 精度を選んでください --</option>
            <option value="excellent">優（+15点）</option>
            <option value="good">良（+10点）</option>
            <option value="ok">可（+5点）</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="kyquality">KY活動の質</label>
          <select id="kyquality">
            <option value="">-- 質を選んでください --</option>
            <option value="excellent">優（+10点）</option>
            <option value="standard">標準（+5点）</option>
            <option value="formal">形式的（+0点）</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="safety">安全行動の確認</label>
          <select id="safety">
            <option value="">-- 安全行動を選んでください --</option>
            <option value="yes">○ 正しい装備・配慮（+5点）</option>
            <option value="no">× 不十分（+0点）</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="notes">備考</label>
          <textarea id="notes" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; min-height: 80px;" placeholder="特記事項があればご記入ください"></textarea>
        </div>
      </div>
      
      <!-- タブ4: ランキング -->
      <div id="ranking" class="tab-content">
        <div class="alert alert-info">
          📊 月次ランキングはここに表示されます。月末に自動で Google Sheets に集計されます。
        </div>
        <div id="rankingDisplay"></div>
      </div>
      
      <!-- ボタングループ -->
      <div class="button-group">
        <button onclick="generateSheet()">📋 シート生成</button>
        <button class="btn-secondary" onclick="clearForm()">クリア</button>
      </div>
    </div>
    
    <!-- シート出力エリア -->
    <div id="sheetOutput" class="sheet-output">
      <div class="sheet-title">📋 朝礼安全・KY活動シート</div>
      
      <div class="sheet-meta">
        <div><strong>日付：</strong><span id="outDate"></span></div>
        <div><strong>リーダー：</strong><span id="outLeader"></span></div>
        <div><strong>作業：</strong><span id="outWork"></span></div>
        <div><strong>工事種別：</strong><span id="outProject"></span></div>
        <div><strong>現場名：</strong><span id="outFacility"></span></div>
        <div><strong>参加者：</strong><span id="outMembers"></span></div>
      </div>
      
      <div class="points-display">
        <div>本日のポイント</div>
        <div class="points-value" id="pointsValue">0</div>
        <div>点</div>
      </div>
      
      <div class="sheet-section">
        <div class="sheet-section-title">⚠️ 重点作業ごとの注意点</div>
        <div class="sheet-content" id="outKeyPoints"></div>
      </div>
      
      <div class="sheet-section">
        <div class="sheet-section-title">🌡️ 季節・環境リスク</div>
        <div class="sheet-content" id="outSeasonalRisk"></div>
      </div>
      
      <div class="sheet-section">
        <div class="sheet-section-title">📍 工事種別での注意</div>
        <div class="sheet-content" id="outProjectNotes"></div>
      </div>
      
      <div class="sheet-section">
        <div class="sheet-section-title">💡 その他の注意</div>
        <div class="sheet-content" id="outOtherNotes"></div>
      </div>
      
      <div class="sheet-section">
        <div class="sheet-section-title">📊 今日の評価</div>
        <table class="data-table">
          <tr>
            <td><strong>気温</strong></td>
            <td id="outTemp">-</td>
            <td><strong>ボーナス</strong></td>
            <td id="outTempBonus">-</td>
          </tr>
          <tr>
            <td><strong>入力精度</strong></td>
            <td id="outAccuracy">-</td>
            <td><strong>難易度</strong></td>
            <td id="outDifficulty">-</td>
          </tr>
          <tr>
            <td><strong>KY活動質</strong></td>
            <td id="outQuality">-</td>
            <td><strong>安全行動</strong></td>
            <td id="outSafety">-</td>
          </tr>
        </table>
      </div>
      
      <div style="margin-top: 2rem; display: flex; gap: 1rem;">
        <button onclick="printSheet()" style="flex: 1;">🖨️ 印刷 / PDF保存</button>
        <button class="btn-secondary" onclick="downloadData()" style="flex: 1;">💾 データを Google Sheets に送信</button>
      </div>
    </div>
  </div>

  <script>
    // ===== KYデータベース =====
    const kyData = {
      grass: {
        name: '🌾 草刈り作業',
        keyPoints: '① 刈刃による切傷防止（厚手手袋・長ズボン・長靴は必須）\n② 飛散物による目・顔の損傷防止（保護メガネ・フェイスシールド装着）\n③ 周囲への安全確認（立入禁止ロープ張設・居住者の位置確認）',
        seasonalRisk: '熱中症【危険】体感36℃以上で作業中止\n→ 日陰で頻繁に休憩し20～30分ごとに給水\n給水タイム例：9:00 / 10:30 / 12:00 / 14:00 / 15:30',
        otherNotes: '騒音あり（耳栓着用推奨）\n足元の石・根を確認してから足を踏む\n疲労時は作業一時中止'
      },
      foundation: {
        name: '🏗️ 基礎工事',
        keyPoints: '① 落下・転倒防止（足元確認・足場安全確保）\n② 重機操作時の接触防止（合図・声掛け・退避位置確認）\n③ 型枠・支保工の安全性確認（倒壊リスク対応）\n④ 掘削時の土砂崩落防止（壁面角度・湿度確認）',
        seasonalRisk: '熱中症対策\n→ 日陰での頻繁な休憩・20～30分ごとに給水\n大雨後の地盤軟化に注意',
        otherNotes: '4S（整理整頓・清掃・清潔・躾）で安全確保\n不明な点は事前確認\n足場の定期点検'
      },
      carpentry: {
        name: '🔨 大工工事',
        keyPoints: '① 丸のこ・電動工具による切傷防止（両手操作・帯電防止）\n② 釘打ち・インパクトドライバーによる損傷防止（安全眼鏡・手の位置確認）\n③ 足場・脚立からの転倒防止（3点支持・ハーネス着用）\n④ 木材の腐食・釘の飛出し確認',
        seasonalRisk: '熱中症対策\n→ 通風管理・こまめな給水\n換気確保・マスク着用',
        otherNotes: '刃物類の安全管理（保管場所明確化）\n片付け・4S実施\n工具点検'
      },
      exterior: {
        name: '🧱 外構・擁壁工事',
        keyPoints: '① ブロック・石材の落下防止（積み方確認・腰の高さ以上は禁止）\n② 重機操作時の接触防止（合図・居住者動線確保）\n③ 掘削時の土砂崩落防止（壁面安全性確認）\n④ 周囲への飛散防止（ネット張設）',
        seasonalRisk: '熱中症対策\n→ 日陰での休憩・給水\n雨天後の地盤軟化に注意\n大雨時は作業見直し',
        otherNotes: '資材の重さ確認・無理な運搬禁止\n足場安全確保\n4S実施'
      },
      cleanup: {
        name: '🧹 清掃・片付け',
        keyPoints: '① 鋭利物による切傷防止（厚手手袋着用・危険物を専用箱に）\n② 重い物の運搬（2人運搬・台車使用・無理しない）\n③ つまずき・転倒防止（4S・足元確認・整理整頓）\n④ 化学薬品の混合禁止（塩素系＋酸性は厳禁）',
        seasonalRisk: '熱中症対策\n→ 換気確保・こまめな給水\n薬品使用時は換気・手袋・マスク着用',
        otherNotes: '分別ルール確認\n危険物の確認・処理方法明確化'
      }
    };

    const projectNotes = {
      new: '新築工事での注意\n・建設中の通行人・近隣への配慮\n・既存電気・ガス・水道への接触厳禁\n・足場の安全確保（大型機材使用時）\n・建築確認申請・検査に対応した記録管理',
      public: '公社工事（既存建物）での注意\n・居住者の安全確保・通行動線確保\n・既存設備の保護（電気・水道・ガス）\n・騒音・粉塵対策（隣接建物への配慮）\n・古い配管・配線の取扱い注意',
      tenant: 'テナント工事での注意\n・営業中テナントの営業時間外作業\n・隣接テナント・共用部への配慮\n・消防設備・通路の保守確保\n・建物管理者への報告・承認',
      other: 'その他工事での注意\n・工事内容に応じた適切な計画書作成\n・関係機関への届出確認\n・特別な安全要件の確認'
    };

    // ===== ポイント計算関数 =====
    function getWeatherBonus(temp) {
      if (!temp) return 0;
      temp = parseInt(temp);
      if (temp >= 36) return 20;
      if (temp >= 31) return 15;
      if (temp >= 26) return 10;
      return 5;
    }

    function getAccuracyPoints(accuracy) {
      const map = { 'excellent': 15, 'good': 10, 'ok': 5 };
      return map[accuracy] || 0;
    }

    function getDifficultyPoints(difficulty) {
      const map = { 'low': 5, 'middle': 10, 'high': 15, 'extreme': 20 };
      return map[difficulty] || 0;
    }

    function getQualityPoints(quality) {
      const map = { 'excellent': 10, 'standard': 5, 'formal': 0 };
      return map[quality] || 0;
    }

    function getSafetyPoints(safety) {
      return safety === 'yes' ? 5 : 0;
    }

    function calculatePoints() {
      const base = 10;
      const temp = document.getElementById('temperature').value;
      const accuracy = document.getElementById('accuracy').value;
      const difficulty = document.getElementById('difficulty').value;
      const quality = document.getElementById('kyquality').value;
      const safety = document.getElementById('safety').value;

      const weather = getWeatherBonus(temp);
      const accuracyPts = getAccuracyPoints(accuracy);
      const difficultyPts = getDifficultyPoints(difficulty);
      const qualityPts = getQualityPoints(quality);
      const safetyPts = getSafetyPoints(safety);

      return base + weather + accuracyPts + difficultyPts + qualityPts + safetyPts;
    }

    // ===== タブ切り替え =====
    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    // ===== シート生成 =====
    function generateSheet() {
      const worktype = document.getElementById('worktype').value;
      const projecttype = document.getElementById('projecttype').value;
      const leader = document.getElementById('leader').value;
      
      if (!worktype) { alert('作業内容を選択してください'); return; }
      if (!projecttype) { alert('工事種別を選択してください'); return; }
      if (!leader) { alert('リーダーを選択してください'); return; }

      const members = Array.from(document.querySelectorAll('input[name="members"]:checked')).map(el => el.value);
      if (members.length === 0) { alert('参加メンバーを選択してください'); return; }

      const data = kyData[worktype];
      const projectLabel = { new: '新築工事', public: '公社工事', tenant: 'テナント工事', other: 'その他' };
      
      const date = document.getElementById('date').value || new Date().toISOString().split('T')[0];
      const facilityName = document.getElementById('facilityname').value || '-';
      const temp = document.getElementById('temperature').value || '-';
      
      const points = calculatePoints();

      // 出力
      document.getElementById('outDate').textContent = date;
      document.getElementById('outLeader').textContent = leader;
      document.getElementById('outWork').textContent = data.name;
      document.getElementById('outProject').textContent = projectLabel[projecttype];
      document.getElementById('outFacility').textContent = facilityName;
      document.getElementById('outMembers').textContent = members.join('、');
      document.getElementById('outKeyPoints').textContent = data.keyPoints;
      document.getElementById('outSeasonalRisk').textContent = data.seasonalRisk;
      document.getElementById('outProjectNotes').textContent = projectNotes[projecttype];
      document.getElementById('outOtherNotes').textContent = data.otherNotes;
      document.getElementById('pointsValue').textContent = points;

      // 評価詳細
      const accuracy = document.getElementById('accuracy').value;
      const accuracyMap = { 'excellent': '優（15点）', 'good': '良（10点）', 'ok': '可（5点）', '': '-' };
      document.getElementById('outAccuracy').textContent = accuracyMap[accuracy];

      const difficulty = document.getElementById('difficulty').value;
      const difficultyMap = { 'low': '低（5点）', 'middle': '中（10点）', 'high': '高（15点）', 'extreme': '極高（20点）', '': '-' };
      document.getElementById('outDifficulty').textContent = difficultyMap[difficulty];

      const quality = document.getElementById('kyquality').value;
      const qualityMap = { 'excellent': '優（10点）', 'standard': '標準（5点）', 'formal': '形式的（0点）', '': '-' };
      document.getElementById('outQuality').textContent = qualityMap[quality];

      const safety = document.getElementById('safety').value;
      const safetyMap = { 'yes': '○（5点）', 'no': '×（0点）', '': '-' };
      document.getElementById('outSafety').textContent = safetyMap[safety];

      const weather = getWeatherBonus(temp);
      document.getElementById('outTemp').textContent = temp === '-' ? '-' : `${temp}℃ （ボーナス: ${weather}点）`;
      document.getElementById('outTempBonus').textContent = `${weather}点`;

      document.getElementById('sheetOutput').classList.add('active');

      // LocalStorage に保存
      saveToLocalStorage({
        date,
        leader,
        worktype: data.name,
        projecttype: projectLabel[projecttype],
        facilityName,
        members,
        points,
        temp,
        weather,
        accuracy: accuracyMap[accuracy],
        difficulty: difficultyMap[difficulty],
        quality: qualityMap[quality],
        safety: safetyMap[safety]
      });

      document.getElementById('sheetOutput').scrollIntoView({ behavior: 'smooth' });
    }

    // ===== LocalStorage 保存 =====
    function saveToLocalStorage(data) {
      let history = JSON.parse(localStorage.getItem('kyHistory') || '[]');
      history.push({
        ...data,
        timestamp: new Date().toISOString()
      });
      localStorage.setItem('kyHistory', JSON.stringify(history));
    }

    // ===== フォームクリア =====
    function clearForm() {
      document.getElementById('date').value = '';
      document.getElementById('leader').value = '';
      document.getElementById('worktype').value = '';
      document.getElementById('projecttype').value = '';
      document.getElementById('facilityname').value = '';
      document.getElementById('temperature').value = '';
      document.getElementById('weather').value = '';
      document.getElementById('difficulty').value = '';
      document.getElementById('accuracy').value = '';
      document.getElementById('kyquality').value = '';
      document.getElementById('safety').value = '';
      document.getElementById('notes').value = '';
      document.querySelectorAll('input[name="members"]').forEach(el => el.checked = false);
      document.getElementById('sheetOutput').classList.remove('active');
    }

    // ===== 印刷 =====
    function printSheet() {
      window.print();
    }

    // ===== Google Sheets 連携 =====
    function downloadData() {
      alert('✅ Google Sheets へのデータ送信機能は後のステップで実装予定です。\n\n今は LocalStorage にデータが保存されています。\n月末に自動で集計されます。');
    }

    // ===== 初期化 =====
    window.addEventListener('load', () => {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('date').value = today;
    });
  </script>
</body>
</html>
